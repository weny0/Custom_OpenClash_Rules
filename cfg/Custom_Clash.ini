;Custom_OpenClash_Rules
;完美修正版（保留 Steam+AI 深度分流，修复底层报错与节点丢失）
;作者：weny0

[custom]

;===============================
; 📌 基础直连（安全层）
;===============================
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

;===============================
; 📡 Steam 分流（核心优化）
;===============================
; Steam 商店 / 社区 / 登录 → 代理
ruleset=🚀 Steam,[]GEOSITE,steam
ruleset=🚀 Steam,[]DOMAIN-SUFFIX,steampowered.com
ruleset=🚀 Steam,[]DOMAIN-SUFFIX,steamcommunity.com
ruleset=🚀 Steam,[]DOMAIN-SUFFIX,steamgames.com
ruleset=🚀 Steam,[]DOMAIN-SUFFIX,steam-chat.com

; Steam 下载 CDN → 直连（满速关键）
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,steamcontent.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,steamstatic.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,steamserver.net
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,steamcdn-a.akamaihd.net
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,steamuserimages-a.akamaihd.net
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,edgecast.steamstatic.com
ruleset=🎯 全球直连,[]DOMAIN-SUFFIX,akamaihd.net

